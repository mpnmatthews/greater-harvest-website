<!-- Include Supabase JS Client (Using standard CDN if not already present) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // 1. Initialize Supabase
  const SUPABASE_URL = "https://amkfdqsrtawqjyryhjqn.supabase.co";
  const SUPABASE_ANON_KEY = "YOUR_PUBLIC_ANON_KEY_HERE"; // Replace with your actual anon key
  const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // 2. Global state for the authenticated user
  let currentUser = null;
  let currentUserRole = 'guest';

  // 3. Centralized Client-Side Router
  function routeToPage(role) {
    console.log(`Routing to view container for role: [${role}]`);
    
    // Hide all view panels first
    const sections = ['home-page', 'pastor-dashboard', 'sanctuary-portal', 'vineyard-portal', 'pending-page'];
    sections.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.display = 'none';
    });

    // Toggle the Gold Pastor View Button in the header if it exists
    const pastorBtn = document.getElementById('pastor-view-btn');
    if (pastorBtn) {
      pastorBtn.style.display = (role === 'pastor') ? 'block' : 'none';
    }

    // Display the targeted container based on role mapping
    switch (role) {
      case 'pastor':
        showElement('pastor-dashboard');
        break;
      case 'local_member':
        showElement('sanctuary-portal');
        break;
      case 'online_member':
        showElement('vineyard-portal');
        break;
      case 'guest':
      default:
        showElement('pending-page');
        break;
    }
  }

  function showElement(id) {
    const el = document.getElementById(id);
    if (el) el.style.display = 'block';
    else console.warn(`Element with id #${id} was not found in the HTML.`);
  }

  // 4. Secure Profile Fetching (Handles RLS authentication window)
  async function fetchUserRole(userId) {
    try {
      console.log("Fetching profile for UUID:", userId);
      
      const { data: profile, error } = await supabase
        .from('profiles')
        .select('user_role')
        .eq('id', userId)
        .single();

      if (error) {
        // If RLS blocks it, or if it doesn't exist yet, it falls through to guest
        console.error("Database read error (Possible RLS blockage):", error.message);
        return 'guest';
      }

      if (profile && profile.user_role) {
        return profile.user_role;
      }
      
      return 'guest';
    } catch (err) {
      console.error("Unexpected error fetching profile:", err);
      return 'guest';
    }
  }

  // 5. The Core Fix: Reactive Auth Listener
  // This fires automatically on load, on sign-in, and on sign-out.
  supabase.auth.onAuthStateChange(async (event, session) => {
    console.log(`Supabase Auth Event Triggered: [${event}]`);

    if (session && session.user) {
      currentUser = session.user;
      // Session token is now active; safe to bypass profiles RLS policy
      currentUserRole = await fetchUserRole(session.user.id);
      console.log(`Identity verified. Assigned role: ${currentUserRole}`);
      routeToPage(currentUserRole);
    } else {
      // No active session found or user logged out
      currentUser = null;
      currentUserRole = 'guest';
      console.log("No authenticated user found. Fallback to public Home.");
      routeToPage('guest'); 
      // Note: Swap to showing a public 'home-page' element here if unauthenticated guests shouldn't see the Pending screen immediately.
    }
  });

  // 6. Form Submission Handlers (Bind these to your actual HTML elements)
  async function handleSignIn(email, password) {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) {
      alert(`Login Failed: ${error.message}`);
    }
    // No routing needed here! onAuthStateChange captures the successful event automatically.
  }

  async function handleSignOut() {
    const { error } = await supabase.auth.signOut();
    if (error) console.error("Logout Error:", error.message);
  }
</script>
